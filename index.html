<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A personal interview-prep question & answer knowledge base." />
  <title>Interview Prep — Q&A</title>

  <!-- Syntax highlighting theme (code blocks keep their own dark background in both themes) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Libraries: Markdown rendering + code highlighting. Order preserved via defer. -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-row">
      <div>
        <h1>Interview Prep</h1>
        <p class="subtitle">My personal question &amp; answer knowledge base</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-icon">🌙</span>
      </button>
    </div>

    <div class="search-wrap">
      <input
        id="search"
        class="search"
        type="search"
        placeholder="Search questions and answers…"
        autocomplete="off"
        aria-label="Search questions and answers"
      />
    </div>

    <div id="chips" class="chips" role="group" aria-label="Filter by category"></div>

    <div class="toolbar">
      <span id="stats" class="stats"></span>
      <div class="toolbar-actions">
        <button id="expand-all" class="link-btn" type="button">Expand all</button>
        <span class="dot">·</span>
        <button id="collapse-all" class="link-btn" type="button">Collapse all</button>
      </div>
    </div>
  </header>

  <main>
    <div id="list" class="list" aria-live="polite"></div>
    <div id="empty" class="empty" hidden></div>
  </main>

  <footer class="site-footer">
    <p>Built with Claude Code · Updated by adding entries to <code>questions.json</code></p>
  </footer>
</body>
</html>
